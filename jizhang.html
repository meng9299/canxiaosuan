<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>餐小算 · 记账 v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
  /* ── 字体缩放变量 (小/中/大) ── */
  --fs-9:9px; --fs-10:10px; --fs-11:11px; --fs-12:12px;
  --fs-13:13px; --fs-14:14px; --fs-15:15px; --fs-16:16px;
  --fs-18:18px; --fs-20:20px; --fs-22:22px; --fs-24:24px; --fs-26:26px;
  --fs-28:28px; --fs-30:30px; --fs-36:36px;

    --brand: #534AB7; --brand-light: #EEEDFE; --brand-mid: #7F77DD;
    --bg: #f3f2ef; --white: #fff; --text: #1a1a1a; --text-s: #555; --text-m: #777;
    --border: rgba(0,0,0,0.1); --radius: 16px; --red: #e74c3c; --green: #27ae60; --orange: #f39c12;
  }
  body {font-weight:600;font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); max-width: 420px; margin: 0 auto; padding-bottom: 90px; min-height:100vh; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--white); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
  .topbar .mid { display: flex; align-items: center; gap: 10px; }
  .topbar .back { font-size: 18px; color: var(--text); text-decoration: none; }
  .topbar .title { font-size: 16px; font-weight: 700; }
  .role-tag { display: flex; align-items: center; gap: 4px; font-size:var(--fs-15); font-weight: 500; cursor: pointer; padding: 4px 10px; border-radius: 16px; background: var(--bg); color: var(--text-s); border: 1px solid var(--border); text-decoration: none; white-space: nowrap; }

  /* 四卡片汇总 */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px; }
  .scard { background: var(--white); border-radius: 14px; padding: 14px; cursor: pointer; transition: all .15s; }
  .scard:active { transform: scale(.98); }
  .scard .sc-label { font-size:var(--fs-15); color: var(--text-m); margin-bottom: 4px; }
  .scard .sc-val { font-size:var(--fs-22); font-weight: 700; }
  .scard .sc-val.income { color: var(--brand); }
  .scard .sc-val.expense { color: var(--red); }
  .scard .sc-sub { font-size:var(--fs-15); color: var(--brand); margin-top: 4px; }

  /* 录入区 */
  .entry-section { margin: 0 14px 14px; background: var(--white); border-radius: var(--radius); padding: 16px; }
  .entry-section .es-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .mode-tabs { display:flex; gap:0; margin-bottom:12px; border-radius:10px; background:var(--bg); padding:3px; }
  .mode-tabs .mt-tab { flex:1; padding:8px 0; border-radius:8px; text-align:center; font-size:var(--fs-14); cursor:pointer; transition:all .15s; color:var(--text-m); }
  .mode-tabs .mt-tab.active { background:var(--white); color:var(--text); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .mode-tabs .mt-set { display:flex; align-items:center; justify-content:center; width:42px; font-size:18px; cursor:pointer; color:var(--text-m); flex-shrink:0; }
  .mode-tabs .mt-set:active { transform:scale(.9); }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }

  /* 周期费用 - iOS 风格简洁列表 */
  .recurring-section { margin: 0 14px 14px; background: var(--white); border-radius: var(--radius); overflow: hidden; }
  .recurring-section .rs-head { display:flex; align-items:center; padding:14px 16px; cursor:pointer; gap:8px; }
  .recurring-section .rs-title { font-size:var(--fs-14); font-weight:600; flex:1; }
  .recurring-section .rs-sub { font-size:var(--fs-15); color:var(--brand); font-weight:600; }
  .recurring-section.collapsed .rs-arrow { transform:rotate(-90deg); }
  .recurring-section.collapsed .rs-body { display:none; }
  .recurring-section .rs-body { padding:0 0 56px; position:relative; }
  .recurring-section .rs-fab {
    position:absolute; right:12px; bottom:8px;
    width:38px; height:38px; border-radius:50%;
    background:var(--brand); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:var(--fs-22); cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.18);
    font-weight:300; user-select:none;
    -webkit-tap-highlight-color:transparent;
    z-index:2;
  }
  .recurring-section .rs-fab:active { transform:scale(.92); }
  .recurring-section.collapsed .rs-fab { display:none; }

  .rc-row { display:flex; align-items:center; padding:12px 16px; gap:10px; cursor:pointer; border-bottom:1px solid #f2f2f2; transition:background .15s; }
  .rc-row:last-child { border-bottom:none; }
  .rc-row:active { background:var(--bg); }
  .rc-row.urgent { background:#fff8f0; }
  .rc-row.urgent:active { background:#fff0e0; }
  .rc-row .rc-icon { font-size:var(--fs-22); flex-shrink:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:var(--bg); border-radius:8px; }
  .rc-row .rc-main { flex:1; min-width:0; }
  .rc-row .rc-name { font-size:var(--fs-15); font-weight:600; color:var(--text); }
  .rc-row .rc-name .rc-cat { color:var(--text-m); font-weight:normal; font-size:var(--fs-15); }
  .rc-row .rc-due { font-size:var(--fs-15); margin-top:2px; }
  .rc-row .rc-amt { font-size:var(--fs-15); font-weight:700; color:var(--text); flex-shrink:0; }
  .rc-row .rc-arrow { color:var(--text-m); font-size:var(--fs-18); flex-shrink:0; }

  /* 员工子项输入行 */
  .sub-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
  .sub-row .sub-name { flex:1; padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:var(--fs-14); }
  .sub-row .sub-amt { width:90px; padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:var(--fs-14); text-align:right; }
  .sub-row .sub-del { color:#e74c3c; font-size:var(--fs-14); cursor:pointer; padding:0 4px; }
  .add-sub-btn { background:#fff5e6; color:#ff8800; border:1px dashed #ffb84d; border-radius:6px; padding:8px 14px; font-size:var(--fs-14); cursor:pointer; font-family:inherit; margin-top:4px; }

  /* 详情弹窗 */
  .rd-sheet { padding-top:0; }
  .rd-icon-big { font-size:48px; text-align:center; margin:8px 0 12px; }
  .rd-name-big { text-align:center; font-size:var(--fs-18); font-weight:600; margin-bottom:4px; }
  .rd-name-big .rd-cat { color:var(--text-m); font-size:var(--fs-15); font-weight:normal; }
  .rd-amt-big { text-align:center; font-size:32px; font-weight:700; color:var(--brand); margin:8px 0 20px; }
  .rd-meta { background:var(--bg); border-radius:10px; padding:4px 14px; margin-bottom:14px; }
  .rd-meta-row { display:flex; justify-content:space-between; padding:10px 0; font-size:var(--fs-15); border-bottom:1px solid #eee; }
  .rd-meta-row:last-child { border-bottom:none; }
  .rd-meta-row span:first-child { color:var(--text-s); }
  .rd-meta-row span:last-child { font-weight:600; }
  .rd-sub-wrap { background:#fff8e1; border-radius:10px; padding:8px 14px; margin-bottom:14px; }
  .rd-sub-title { font-size:var(--fs-15); color:var(--text-m); margin-bottom:4px; }
  .rd-sub-row { display:flex; justify-content:space-between; padding:6px 0; font-size:var(--fs-15); border-bottom:1px solid #f0e0a0; }
  .rd-sub-row:last-child { border-bottom:none; }
  .rd-actions { display:flex; gap:8px; margin-top:8px; }
  .rd-btn { flex:1; padding:12px 8px; border-radius:10px; border:1px solid #ddd; background:#fff; font-size:var(--fs-15); cursor:pointer; font-family:inherit; }
  .rd-btn.rd-pay { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }
  .rd-btn.rd-pay:disabled { background:#ccc; border-color:#ccc; }
  .rd-btn.rd-edit { color:var(--text); }
  .rd-btn.rd-del { color:#e74c3c; border-color:#f5c6c6; }
  .cat-chip { padding: 10px 6px; border-radius: 12px; background: var(--bg); border: 1.5px solid transparent; text-align: center; cursor: pointer; transition: all .15s; font-size: 13px; }
  .cat-chip:active { transform: scale(.95); }
  .cat-chip.selected { border-color: var(--brand); background: var(--brand-light); }
  .cat-chip .cc-icon { font-size: 20px; display: block; margin-bottom: 2px; }
  .cat-chip .cc-name { font-size: 13px; color: var(--text-s); }
  .cat-chip { position:relative; }
  .cat-chip .cc-delete { position:absolute; bottom:2px; right:2px; width:18px; height:18px; line-height:18px; border-radius:50%; font-size:var(--fs-9); background:rgba(255,0,0,.1); color:#e74c3c; text-align:center; cursor:pointer; }
  .cat-chip .cc-delete:hover { background:var(--red); color:#fff; }
  .cat-chip .cc-reorder { position:absolute; left:2px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:0; }
  .cat-chip .cc-up, .cat-chip .cc-down { width:14px; height:14px; line-height:14px; font-size:7px; text-align:center; cursor:pointer; color:var(--text-m); border-radius:3px; }
  .cat-chip .cc-up:active, .cat-chip .cc-down:active { background:var(--brand-light); color:var(--brand); }
  .cat-chip .cc-inline-input { width:90%; padding:2px 4px; border:1px solid var(--brand); border-radius:6px; font-size:var(--fs-15); text-align:center; font-family:inherit; background:#fff; }
  .cat-chip.custom { border-style:dashed; border-color:var(--border); background:transparent; }
  .cat-chip.custom .cc-icon { font-size:var(--fs-16); opacity:.6; }

  /* 金额输入行 */
  .amt-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .amt-row .ar-prefix { font-size: 24px; font-weight: 700; color: var(--red); }
  .amt-row input { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 14px; font-size: 20px; font-weight: 700; font-family: inherit; outline: none; text-align: center; max-width: calc(100% - 50px); }
  .amt-row input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
  .amt-row .ar-unit { font-size: 13px; color: var(--text-m); }
  .add-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--brand); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .add-btn:active { opacity: .85; }
  .add-btn:disabled { background: #ccc; cursor: default; }

  /* 今日总览条 */
  .today-bar { margin: 0 14px 10px; background: linear-gradient(135deg, #534AB7, #7F77DD); border-radius: 14px; padding: 14px 16px; color: #fff; display: flex; justify-content: space-around; text-align: center; }
  .today-bar .tb-item {}
  .today-bar .tb-label { font-size: 11px; opacity: .8; }
  .today-bar .tb-val { font-size: 20px; font-weight: 700; margin-top: 2px; }

  /* 明细区 */
  .detail-section { margin: 12px 14px 14px; }
  .detail-section .ds-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .detail-section .ds-title { font-size: 14px; font-weight: 600; }

  .detail-list { background: var(--white); border-radius: var(--radius); overflow: hidden; }
  .d-item { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .d-item:last-child { border-bottom: none; }
  .d-item .di-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 10px; flex-shrink: 0; }
  .d-item .di-info { flex: 1; }
  .d-item .di-title { font-size: 13px; font-weight: 500; }
  .d-item .di-meta { font-size: 11px; color: var(--text-m); }
  .d-item .di-amt { font-size: 15px; font-weight: 700; color: var(--red); }
  .d-item .di-del { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #f5c6cb; background: #fff5f5; color: var(--red); font-size: 12px; cursor: pointer; margin-left: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .d-total { display: flex; justify-content: flex-end; align-items: center; padding: 12px 14px; background: #fafafa; font-size: 14px; font-weight: 700; color: var(--red); gap: 8px; }
  .d-total .dt-label { color: var(--text-s); font-size: 13px; }

  .empty-hint { text-align: center; padding: 28px 14px; color: var(--text-m); font-size: 13px; line-height: 2; background: var(--white); border-radius: var(--radius); }

  /* 明细弹窗 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99; display: none; align-items: flex-end; justify-content: center; }
  .overlay.show { display: flex; }
  .sheet { background: var(--white); width: 100%; max-width: 420px; border-radius: 20px 20px 0 0; max-height: 70vh; display: flex; flex-direction: column; animation: slideUp .25s; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet .sh-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .sheet .sh-title { font-size: 15px; font-weight: 600; }
  .sheet .sh-close { font-size: 22px; cursor: pointer; color: var(--text-m); }
  .sheet .sh-body { flex: 1; overflow-y: auto; padding: 12px 16px; }

  /* 弹窗内表单 — 现代卡片风 */
  .sh-body .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .sh-body .form-group { flex: 1; margin-bottom: 12px; }
  .sh-body .form-group label { display: block; font-size: 12px; color: var(--text-m); margin-bottom: 5px; font-weight: 500; }
  .sh-body .form-group input,
  .sh-body .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: #fafafa; font-family: inherit; box-sizing: border-box; }
  .sh-body .form-group input:focus,
  .sh-body .form-group select:focus { outline: none; border-color: var(--brand); background: #fff; }
  .sh-body .form-group small { display: block; margin-top: 4px; font-size: 11px; color: var(--text-m); }
  .sh-body .btn-submit { display: block; width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--brand); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }
  .sh-body .btn-submit:active { transform: scale(.98); }
  .im-group-title { font-size:13px; color:var(--text-m); font-weight:600; margin:14px 0 8px; }
  .im-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .im-icon-btn { width:44px; height:44px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; flex-shrink:0; border:1px solid var(--border); }
  .im-icon-btn:active { transform:scale(.95); }
  .im-name-input { flex:1; padding:9px 11px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; outline:none; min-width:0; }
  .im-name-input:focus { border-color:var(--brand); background:#fff; }
  .im-del-btn { flex-shrink:0; width:38px; height:38px; border-radius:10px; border:1px solid var(--border); background:#fff; font-size:18px; cursor:pointer; }
  .im-del-btn:active { transform:scale(.95); }
  .btn-cancel { flex:1; padding:12px; border:1px solid var(--border); border-radius:12px; background:#fafafa; color:var(--text-m); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-cancel:active { transform:scale(.98); }
  .cd-item { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .cd-info { font-size:13px; color:var(--text-m); flex:1; min-width:0; }
  .cd-sel { flex-shrink:0; padding:7px 9px; border:1px solid var(--border); border-radius:9px; font-size:13px; font-family:inherit; background:#fafafa; max-width:140px; }

  /* 周期费用 — 员工清单 */
  .sub-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sub-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: #fafafa; font-family: inherit; }
  .sub-row input:focus { outline: none; border-color: var(--brand); background: #fff; }
  .sub-row .sub-del { color: #e74c3c; font-size: 14px; cursor: pointer; padding: 4px; }
  .add-sub-btn { display: inline-block; padding: 6px 14px; border: 1.5px dashed #ccc; border-radius: 8px; background: transparent; font-size: 13px; color: var(--text-s); cursor: pointer; font-family: inherit; margin-top: 4px; }

  /* 角色切换弹窗 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-sheet { background: var(--white); width: 100%; max-width: 420px; border-radius: 20px 20px 0 0; padding: 20px 18px 30px; animation: slideUp 0.25s; }
  .modal-sheet .ms-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 16px; }
  .ms-role { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; border: 1.5px solid transparent; margin-bottom: 8px; transition: all 0.15s; }
  .ms-role:hover { background: var(--brand-light); }
  .ms-role.selected { border-color: var(--brand); background: var(--brand-light); }
  .ms-role .msr-icon { font-size: 26px; }
  .ms-role .msr-name { font-size: 14px; font-weight: 600; }
  .ms-role .msr-desc { font-size: 11px; color: var(--text-m); }
  .ms-cancel { display: block; width: 100%; padding: 12px; background: var(--bg); border: none; border-radius: 12px; margin-top: 8px; font-size: 14px; cursor: pointer; color: var(--text-s); font-family: inherit; }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; -webkit-transform:translateX(-50%); transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--white); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 4px); z-index: 50; }
  .nav-item {font-weight:600; flex: 1; text-align: center; padding: 10px 0 8px; font-size:var(--fs-15); color: var(--text-m); cursor: pointer; text-decoration: none; }
  .nav-item.active { color: var(--brand); }
  .nav-item .n-icon { font-size: 20px; display: block; margin-bottom: 2px; }
  .nav-item .n-label { font-size:var(--fs-15); font-weight:600; }
  .tb-notif{font-size:var(--fs-20);cursor:pointer;position:relative;}
  .tb-notif sup{font-size:var(--fs-14);background:#e74c3c;color:#fff;padding:1px 5px;border-radius:8px;position:relative;top:-6px;}
</style>

<script>
/* ═══ 字体缩放 小/中/大 ═══ */
(function(){
  var KEY = 'sxs_font_size';
  var cur = localStorage.getItem(KEY) || 'small';
  document.documentElement.setAttribute('data-font-size', cur);
  window.getFontSize = function(){ return localStorage.getItem(KEY)||'small'; };
  window.setFontSize = function(lv){
    if(['small','medium','large'].indexOf(lv)<0) return;
    localStorage.setItem(KEY, lv);
    document.documentElement.setAttribute('data-font-size', lv);
    window.dispatchEvent(new Event('resize'));
  };
})();
</script>

</head>
<body>

<div class="topbar">
  <div class="mid"><a class="back" id="backLink" href="catering.html">←</a><span class="title">📒 记账</span></div>
  <a class="role-tag" id="roleTag" href="javascript:void(0)" onclick="openRoleSwitcher()">👔 老板</a>
</div>

<!-- 四卡片 -->
<div class="summary-row">
  <div class="scard" onclick="showDetail('income')">
    <div class="sc-label">今日收款</div>
    <div class="sc-val income" id="sIncome">¥0</div>
  </div>
  <div class="scard" onclick="showDetail('expense')">
    <div class="sc-label">今日支出</div>
    <div class="sc-val expense" id="sExpense">¥0</div>
  </div>
  <div class="scard" onclick="showDetail('income')">
    <div class="sc-label">收款明细</div>
    <div class="sc-sub">查看 →</div>
  </div>
  <div class="scard" onclick="showDetail('expense')">
    <div class="sc-label">支出明细</div>
    <div class="sc-sub">查看 →</div>
  </div>
</div>

<!-- 周期费用 -->
<div class="recurring-section collapsed" id="recurringSection">
  <div class="rs-head fold-head" onclick="toggleRecurringSec()">
    <span class="rs-title">📅 周期费用</span>
    <span class="rs-sub" id="rsSub">¥0/月</span>
    <span class="rs-arrow fold-arrow open" id="recurringArrow">▼</span>
  </div>
  <div class="rs-body" id="recurringBody">
    <div id="recurringList"></div>
    <div class="rs-fab" onclick="event.stopPropagation();openRecurringModal();" title="添加">＋</div>
  </div>
</div>

<!-- 周期费用详情弹窗 -->
<div class="overlay" id="recurringDetail" onclick="if(event.target===this)closeRecurringDetail()">

<script>
// ═══════════ 支出分类预设 ═══════════
var CATS = [
  { id: 'food',   name: '食材',   icon: '🥩', color: '#fde8e8' },
  { id: 'gas',    name: '煤气',   icon: '🔥', color: '#fff3e0' },
  { id: 'daily',  name: '日杂',   icon: '🧹', color: '#e8f5e9' },
  { id: 'elec',   name: '水电',   icon: '💡', color: '#e3f2fd' },
  { id: 'rent',   name: '房租',   icon: '🏠', color: '#f3e5f5' },
  { id: 'salary', name: '工资',   icon: '💼', color: '#fff8e1' },
  { id: 'repair', name: '维修',   icon: '🔧', color: '#efebe9' }
];
var selCat = null;
var entryMode = 'expense'; // 'expense' | 'income'

// 收款分类
var INCOME_CATS = [
  { id: 'online',  name: '线上收款', icon: '📱', color: '#e8f5e9' },
  { id: 'offline', name: '线下收款', icon: '💳', color: '#e3f2fd' },
  { id: 'cash',    name: '现金',     icon: '💵', color: '#fff8e1' }
];
var customCats = (function(){
  try{ var d=localStorage.getItem('sxs_custom_cats'); return d?JSON.parse(d):[]; }catch(e){return[];}
})();
var customIncomeCats = (function(){
  try{ var d=localStorage.getItem('sxs_custom_income_cats'); return d?JSON.parse(d):[]; }catch(e){return[];}
})();
function saveCustomCats(){ localStorage.setItem('sxs_custom_cats',JSON.stringify(customCats)); }
function saveCustomIncomeCats(){ localStorage.setItem('sxs_custom_income_cats',JSON.stringify(customIncomeCats)); }

// ═══════════ 周期记账 ═══════════
function getRecurring(){
  try{ var d=localStorage.getItem('sxs_recurring_bills'); return d?JSON.parse(d):[]; }catch(e){return[];}
}
function setRecurring(v){ localStorage.setItem('sxs_recurring_bills',JSON.stringify(v)); }

// 算下次应记日期
function nextBillDate(bill, fromDate){
  fromDate = fromDate || new Date();
  var last = bill.lastPaid || bill.startDate;
  if(!last) return bill.startDate;
  var d = new Date(last);
  var cycle = bill.cycle; // 'month' | 'half-month' | 'week'
  if(cycle==='month') d.setMonth(d.getMonth()+1);
  else if(cycle==='half-month') d.setDate(d.getDate()+15);
  else if(cycle==='week') d.setDate(d.getDate()+7);
  // 超过今天则继续算
  while(d <= fromDate){
    if(cycle==='month') d.setMonth(d.getMonth()+1);
    else if(cycle==='half-month') d.setDate(d.getDate()+15);
    else if(cycle==='week') d.setDate(d.getDate()+7);
  }
  return d.toISOString().slice(0,10);
}

// 距今天多少天（负=已逾期）
function daysUntil(dateStr){
  var d = new Date(dateStr);
  var now = new Date(); now.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function openRecurringModal(editId){
  var sel = document.getElementById('rbCat');
  var opts = '<option value="">-- 选分类 --</option>';
  CATS.forEach(function(c){ opts += '<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>'; });
  sel.innerHTML = opts;
  sel.onchange = onRbCatChange;
  document.getElementById('rbName').value = '';
  document.getElementById('rbAmount').value = '';
  document.getElementById('rbCycle').value = 'month';
  document.getElementById('rbStart').value = today();
  document.getElementById('rbSubList').innerHTML = '';
  document.getElementById('rbSubWrap').style.display = 'none';

  if(editId){
    var list = getRecurring();
    var b = list.find(function(x){return x.id===editId;});
    if(b){
      document.getElementById('rbName').value = b.name;
      document.getElementById('rbCat').value = b.catId;
      document.getElementById('rbAmount').value = b.amount||'';
      document.getElementById('rbCycle').value = b.cycle;
      document.getElementById('rbStart').value = b.startDate;
      if(b.subItems && b.subItems.length){
        document.getElementById('rbSubWrap').style.display = 'block';
        b.subItems.forEach(function(s){ addSubRow(s.name, s.amount); });
      }
      document.getElementById('rbSaveBtn').textContent = '💾 更新';
      onRbCatChange();
    }
  } else {
    document.getElementById('rbSaveBtn').textContent = '＋ 添加';
  }
  document.getElementById('recurringModal').classList.add('show');
}

// 分类切换：工资类才显示员工清单
function onRbCatChange(){
  var cat = document.getElementById('rbCat').value;
  var wrap = document.getElementById('rbSubWrap');
  if(cat==='salary'){
    wrap.style.display = 'block';
    if(!document.getElementById('rbSubList').children.length){
      addSubRow();
    }
  } else {
    wrap.style.display = 'none';
  }
}

function addSubRow(name, amount){
  name = name||''; amount = amount||'';
  var div = document.createElement('div');
  div.className = 'sub-row';
  div.innerHTML =
    '<input type="text" placeholder="员工姓名" class="sub-name" value="'+name+'">'+
    '<input type="number" placeholder="金额" step="0.01" class="sub-amt" value="'+amount+'" oninput="updateSubTotal()">'+
    '<span class="sub-del" onclick="this.parentElement.remove();updateSubTotal();">✕</span>';
  document.getElementById('rbSubList').appendChild(div);
  updateSubTotal();
}

function updateSubTotal(){
  var rows = document.querySelectorAll('#rbSubList .sub-row');
  var total = 0;
  rows.forEach(function(r){
    var v = parseFloat(r.querySelector('.sub-amt').value)||0;
    total += v;
  });
  if(total>0){
    document.getElementById('rbAmount').value = total.toFixed(2);
  }
}

function closeRecurringModal(){ document.getElementById('recurringModal').classList.remove('show'); }

function saveRecurring(){
  var editId = document.getElementById('rbEditId').value;
  var name = document.getElementById('rbName').value.trim();
  var catId = document.getElementById('rbCat').value;
  var amount = parseFloat(document.getElementById('rbAmount').value)||0;
  var cycle = document.getElementById('rbCycle').value;
  var startDate = document.getElementById('rbStart').value;
  if(!name){ toast('请输入费用名'); return; }
  if(!catId){ toast('请选分类'); return; }
  if(amount<=0){ toast('请输入金额'); return; }
  if(!startDate){ toast('请选起始日'); return; }

  var subItems = [];
  if(catId==='salary'){
    document.querySelectorAll('#rbSubList .sub-row').forEach(function(r){
      var n = r.querySelector('.sub-name').value.trim();
      var a = parseFloat(r.querySelector('.sub-amt').value)||0;
      if(n && a>0) subItems.push({name:n, amount:a});
    });
  }

  var list = getRecurring();
  if(editId){
    var i = list.findIndex(function(x){return x.id===editId;});
    if(i>=0){
      list[i].name=name; list[i].catId=catId; list[i].amount=amount;
      list[i].cycle=cycle; list[i].startDate=startDate;
      list[i].subItems = subItems;
    }
  } else {
    list.push({
      id: 'rb_'+Date.now(),
      name: name, catId: catId, amount: amount,
      cycle: cycle, startDate: startDate, lastPaid: null,
      subItems: subItems
    });
  }
  setRecurring(list);
  closeRecurringModal();
  renderRecurring();
  toast(editId?'已更新':'已添加');
}

function editRecurring(id){
  openRecurringModal(id);
}

function delRecurring(id){
  if(!confirm('确定删除这条周期费用？')) return;
  setRecurring(getRecurring().filter(function(x){return x.id!==id;}));
  renderRecurring();
  toast('已删除');
}

// 一键记一笔：工资按人拆条，其他单条
function toggleRecurringSec(){
  var sec=document.getElementById('recurringSection');
  if(sec) sec.classList.toggle('collapsed');
}

function payRecurring(id){
  var list = getRecurring();
  var b = list.find(function(x){return x.id===id;});
  if(!b) return;
  if(b.lastPaid === today()){
    toast('今天已记过一笔'); return;
  }
  var cat = CATS.find(function(x){return x.id===b.catId});
  var catName = cat?cat.name:'其他';
  var recs = getRecords();
  var added = 0;
  var totalAmt = b.amount;

  if(b.catId==='salary' && b.subItems && b.subItems.length){
    b.subItems.forEach(function(s){
      recs.push({
        date: today(),
        catId: b.catId,
        catName: catName+'·'+s.name,
        amount: s.amount,
        type: 'expense',
        source: 'recurring'
      });
      added++;
    });
    totalAmt = b.subItems.reduce(function(s,x){return s+x.amount;},0);
  } else {
    recs.push({
      date: today(),
      catId: b.catId,
      catName: catName+'·'+b.name,
      amount: b.amount,
      type: 'expense',
      source: 'recurring'
    });
    added = 1;
  }
  setRecords(recs);
  b.lastPaid = today();
  setRecurring(list);
  renderRecurring();
  renderAll();
  toast('已记：'+b.name+(added>1?'（'+added+'笔）':'')+' ¥'+totalAmt);
}

// 列表渲染：极简版，只显总数+状态，点行进详情
function renderRecurring(){
  var list = getRecurring();
  var div = document.getElementById('recurringList');
  var subEl = document.getElementById('rsSub');
  if(!list.length){
    div.innerHTML = '<div style="text-align:center;color:var(--text-m);padding:32px 12px;font-size:var(--fs-14);line-height:1.8;">还没有周期费用<br><span style="color:var(--brand)">点右下角"＋"开始</span></div>';
    if(subEl) subEl.textContent = '';
    return;
  }
  // 头部小计：本月预计固定支出
  var monthlyTotal = 0;
  list.forEach(function(b){
    var amt = b.amount;
    if(b.catId==='salary' && b.subItems && b.subItems.length){
      amt = b.subItems.reduce(function(s,x){return s+x.amount;},0);
    }
    var mult = b.cycle==='month'?1:b.cycle==='half-month'?2:b.cycle==='week'?4:1;
    monthlyTotal += amt*mult;
  });
  if(subEl) subEl.textContent = '约 ¥'+monthlyTotal.toFixed(0)+'/月';
  var h = '';
  list.forEach(function(b){
    var cat = CATS.find(function(x){return x.id===b.catId});
    var catIcon = cat?cat.icon:'📌';
    var catName = cat?cat.name:'其他';
    var cycleText = b.cycle==='month'?'每月':b.cycle==='half-month'?'半月':b.cycle==='week'?'每周':'自定义';

    var totalAmt = b.amount;
    var subHint = '';
    if(b.catId==='salary' && b.subItems && b.subItems.length){
      totalAmt = b.subItems.reduce(function(s,x){return s+x.amount;},0);
      subHint = '<span style="color:var(--text-m);font-size:var(--fs-14);">· '+b.subItems.length+'人</span>';
    }

    var nextDate = nextBillDate(b);
    var diff = daysUntil(nextDate);
    var dueText, dueColor, isUrgent = false;
    if(diff < 0){
      dueText = '⚠️ 逾期 '+Math.abs(diff)+' 天'; dueColor = '#e74c3c'; isUrgent = true;
    } else if(diff === 0){
      dueText = '⏰ 今天应记'; dueColor = '#ff8800'; isUrgent = true;
    } else if(diff <= 3){
      dueText = diff+' 天后'; dueColor = '#ff8800'; isUrgent = true;
    } else {
      dueText = diff+' 天后'; dueColor = 'var(--text-s)';
    }

    h += '<div class="rc-row '+(isUrgent?'urgent':'')+'" onclick="openRecurringDetail(\''+b.id+'\')">'+
      '<div class="rc-icon">'+catIcon+'</div>'+
      '<div class="rc-main">'+
        '<div class="rc-name">'+b.name+'<span class="rc-cat"> · '+catName+cycleText+'</span>'+subHint+'</div>'+
        '<div class="rc-due" style="color:'+dueColor+'">'+dueText+'</div>'+
      '</div>'+
      '<div class="rc-amt">¥'+totalAmt.toFixed(0)+'</div>'+
      '<div class="rc-arrow">›</div>'+
    '</div>';
  });
  div.innerHTML = h;
}

// 详情弹窗
function openRecurringDetail(id){
  var list = getRecurring();
  var b = list.find(function(x){return x.id===id;});
  if(!b) return;
  var cat = CATS.find(function(x){return x.id===b.catId});
  var catIcon = cat?cat.icon:'📌';
  var catName = cat?cat.name:'其他';
  var cycleText = b.cycle==='month'?'每月':b.cycle==='half-month'?'半月':b.cycle==='week'?'每周':'自定义';

  var totalAmt = b.amount;
  var subHtml = '';
  if(b.catId==='salary' && b.subItems && b.subItems.length){
    totalAmt = b.subItems.reduce(function(s,x){return s+x.amount;},0);
    subHtml = '<div class="rd-sub-wrap"><div class="rd-sub-title">员工明细</div>'+
      b.subItems.map(function(s){

function catTouchEnd(){ if(catLongPressTimer){ clearTimeout(catLongPressTimer); catLongPressTimer=null; } }

function moveCat(id, dir){
  var list = (entryMode==='income') ? customIncomeCats : customCats;
  var idx = -1;
  for(var i=0;i<list.length;i++){ if(list[i].id===id){ idx=i; break; } }
  if(idx<0) return;
  var newIdx = idx+dir;
  if(newIdx<0 || newIdx>=list.length) return;
  var tmp = list[idx]; list[idx]=list[newIdx]; list[newIdx]=tmp;
  if(entryMode==='income'){ saveCustomIncomeCats(); } else { saveCustomCats(); }
  renderCats();
}

// ═══════════ 重命名分类 ═══════════
function renameCat(id){
  // 从四个来源查找
  var c = CATS.find(function(x){return x.id===id;})
       || customCats.find(function(x){return x.id===id;})
       || INCOME_CATS.find(function(x){return x.id===id;})
       || customIncomeCats.find(function(x){return x.id===id;});
  if(!c) return;
  // 判断归属
  var isExpPreset = CATS.find(function(x){return x.id===id;}) ? true : false;
  var isIncPreset = INCOME_CATS.find(function(x){return x.id===id;}) ? true : false;
  var isExpCustom = /^custom_/.test(id);
  var isIncCustom = /^inc_custom_/.test(id);

  var el = document.getElementById('cn_'+id);
  if(!el) return;
  var oldName = c.name;
  var input = document.createElement('input');
  input.value = oldName;
  input.className = 'cc-inline-input';
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
  input.select();
  var save = function(){
    var v = input.value.trim();
    if(v && v !== oldName){
      c.name = v;
      if(isExpPreset){
        var presetNames = {};
        try{ var d=localStorage.getItem('sxs_cat_names'); if(d) presetNames=JSON.parse(d); }catch(e){}
        presetNames[id] = v;
        localStorage.setItem('sxs_cat_names',JSON.stringify(presetNames));
      } else if(isIncPreset){
        var incNames = {};
        try{ var d=localStorage.getItem('sxs_inc_cat_names'); if(d) incNames=JSON.parse(d); }catch(e){}
        incNames[id] = v;
        localStorage.setItem('sxs_inc_cat_names',JSON.stringify(incNames));
      } else if(isExpCustom){
        saveCustomCats();
      } else if(isIncCustom){
        saveCustomIncomeCats();
      }
      // 更新历史记录
      var recs = getRecords();
      recs.forEach(function(r){ if(r.catId===id) r.catName=v; });
      setRecords(recs);
    }
    renderCats();
    renderAll();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ke){
    if(ke.key==='Enter'){ input.blur(); }
    if(ke.key==='Escape'){ renderCats(); }
  });
}

function deleteCat(id){

    if(selCat===id) selCat=null;

  var pn={}, pi={}, inn={}, ini={};

// ═══════════ 删除分类（迁移记录保护） ═══════════
var cdCatId=null, cdGroup=null, cdRecs=[], cdTargets={};
function confirmDelCat(catId, group){
  cdCatId=catId; cdGroup=group; cdTargets={};
  var arr = (group==='income')?customIncomeCats:customCats;
  var cat = arr.find(function(c){return c.id===catId;});
  var catName = cat?cat.name:'该分类';
  var recs = getRecords().filter(function(r){return r.catId===catId;});
  cdRecs = recs;
  var targets = buildTargetCats(group, catId);
  var allSel = document.getElementById('cdAllSelect');
  if(allSel){
    allSel.innerHTML = '<option value="">选择目标类目…</option>' + targets.map(function(t){return '<option value="'+t.id+'">'+t.icon+' '+t.name+'</option>';}).join('');
  }
  var hint = document.getElementById('cdHint');
  if(recs.length===0){
    hint.textContent = '「'+catName+'」下没有记录，可直接删除。';
    document.getElementById('cdAllRow').style.display='none';
    document.getElementById('cdList').innerHTML='';
    setCdConfirm(true);
  } else {
    hint.textContent = '「'+catName+'」下还有 '+recs.length+' 笔记录，请先把它们改到其他类目，才能删除。';
    document.getElementById('cdAllRow').style.display='block';
    renderCdList(targets);
    setCdConfirm(false);
  }
  document.getElementById('catDelModal').classList.add('show');
}
function buildTargetCats(group, exceptId){
  var list=[];
  if(group==='income'){
    INCOME_CATS.forEach(function(c){ if(c.id!==exceptId) list.push(c); });
    customIncomeCats.forEach(function(c){ if(c.id!==exceptId) list.push(c); });
  } else {
    CATS.forEach(function(c){ if(c.id!==exceptId) list.push(c); });
    customCats.forEach(function(c){ if(c.id!==exceptId) list.push(c); });
  }
  return list;
}
function renderCdList(targets){
  var box = document.getElementById('cdList');
  if(!box) return;
  var h='';
  cdRecs.forEach(function(r){
    var sel = cdTargets[r.id]||'';
    var opts='<option value="">选择类目…</option>';
    targets.forEach(function(t){
      var s = (t.id===sel)?' selected':'';
      opts += '<option value="'+t.id+'"'+s+'>'+t.icon+' '+t.name+'</option>';
    });
    h += '<div class="cd-item">'+
      '<div class="cd-info">'+ (r.time&&r.time!=='undefined'?r.time:'—') +' · ¥'+r.amount.toLocaleString() +' · '+(r.catName||'其他') +'</div>'+
      '<select class="cd-sel" onchange="cdPick(\''+r.id+'\',this.value)">'+opts+'</select>'+
    '</div>';
  });
  box.innerHTML=h;
  setCdConfirm(cdRecs.length>0 ? cdRecs.every(function(r){return cdTargets[r.id];}) : true);
}
function cdPick(recId, targetId){
  if(targetId) cdTargets[recId]=targetId; else delete cdTargets[recId];
  setCdConfirm(cdRecs.length>0 ? cdRecs.every(function(r){return cdTargets[r.id];}) : true);
}
function cdApplyAll(targetId){
  if(!targetId) return;
  cdRecs.forEach(function(r){ cdTargets[r.id]=targetId; });
  renderCdList(buildTargetCats(cdGroup, cdCatId));
}
function setCdConfirm(on){
  var b=document.getElementById('cdConfirmBtn');
  if(!b) return;
  b.disabled=!on;
  b.style.opacity = on?'1':'.5';
}
function cdConfirmDelete(){
  var b=document.getElementById('cdConfirmBtn');
  if(!b || b.disabled) return;
  if(cdRecs.length>0){
    var recs = getRecords();
    var targets = buildTargetCats(cdGroup, cdCatId);
    cdRecs.forEach(function(r){
      var tid = cdTargets[r.id];
      if(tid){
        var t = targets.find(function(x){return x.id===tid;});
        if(t){ r.catId=t.id; r.catName=t.name; r.catIcon=t.icon; r.catColor=t.color||'#fafafa'; }
      }
    });
    setRecords(recs);
  }
  if(cdGroup==='income'){
    customIncomeCats = customIncomeCats.filter(function(c){return c.id!==cdCatId;});
    saveCustomIncomeCats();
  } else {
    customCats = customCats.filter(function(c){return c.id!==cdCatId;});
    saveCustomCats();
  }
  closeCatDel();
  renderImList(); renderCats();
  toast('已删除分类，记录已迁移');
}
function closeCatDel(){ var m=document.getElementById('catDelModal'); if(m) m.classList.remove('show'); }

function showCustomInput(){
  ccPickedIcon = '📌';
  document.getElementById('ccName').value = '';
  renderIconGrid();
  document.getElementById('customCatModal').classList.add('show');
  setTimeout(function(){ document.getElementById('ccName').focus(); }, 300);
}

function renderIconGrid(){
  var grid = document.getElementById('iconGrid');
  var h = '';
  CC_ICONS.forEach(function(ic){
    var sel = ic===ccPickedIcon ? ' style="background:var(--brand-light);border:2px solid var(--brand);"' : '';

      '<span style="font-size:var(--fs-22);">'+ic+'</span></div>';

function pickIcon(ic){
  ccPickedIcon = ic;
  renderIconGrid();

function renderCeIconGrid(){
  var grid = document.getElementById('ceIconGrid');

  var h = '';
  CC_ICONS.forEach(function(ic){

function saveCustomCat(){
  var name = document.getElementById('ccName').value.trim();
  if(!name){ toast('请输入分类名称'); return; }
  var id;
  if(entryMode==='income'){
    id = 'inc_custom_'+Date.now();
    customIncomeCats.push({ id:id, name:name, icon:ccPickedIcon, color:'#fafafa' });
    saveCustomIncomeCats();
  } else {
    id = 'custom_'+Date.now();
    customCats.push({ id:id, name:name, icon:ccPickedIcon, color:'#fafafa' });
    saveCustomCats();
  }
  closeCustomCatModal();
  selCat = id;
  renderCats();
  document.getElementById('amtInput').focus();
}

function closeCustomCatModal(){
  document.getElementById('customCatModal').classList.remove('show');
}

document.getElementById('amtInput').addEventListener('input', updateAddBtn);

function addRecord(){
  if(!selCat) return;
  var amt = parseFloat(document.getElementById('amtInput').value)||0;
  if(amt<=0) return;

  var cList = entryMode==='income' ? INCOME_CATS.concat(customIncomeCats) : CATS.concat(customCats);
  var c = cList.find(function(x){ return x.id===selCat; });
  if(!c) return;

  var recs = getRecords();
  recs.push({
    id: 'jz_'+Date.now(),
    date: today(),
    time: new Date().toTimeString().slice(0,5),
    type: entryMode,
    catId: c.id,
    catName: c.name,
    catIcon: c.icon,
    catColor: c.color,
    amount: amt
  });
  setRecords(recs);
  document.getElementById('amtInput').value='';
  selCat=null;
  renderCats();
  renderAll();
}

function delRecord(id){
  if(!confirm('确定删除这条记录？')) return;
  var recs = getRecords().filter(function(r){ return r.id!==id; });
  setRecords(recs);
  renderAll();
}

// ═══════════ 汇总 ═══════════
// 从采购页读今日采购总额
function getTodayPurchaseTotal(){
  try{
    var d=localStorage.getItem('sxs_purchase_records');
    if(!d) return 0;
    var records=JSON.parse(d);
    var td=today();
    return records
      .filter(function(r){ return r.date && r.date.slice(0,10)===td; })
      .reduce(function(s,r){ return s+(r.total||0); },0);
  }catch(e){ return 0; }
}

function renderAll(){
  renderCats();
  renderRecurring();
  var trecs = todayRecords();
  trecs.sort(function(a,b){ return b.id.localeCompare(a.id); });

  var incomes = trecs.filter(function(r){ return r.type==='income'; });
  var expenses = trecs.filter(function(r){ return r.type!=='income' || !r.type; });

  var totalInc = 0, totalExp = 0;
  incomes.forEach(function(r){ totalInc += r.amount; });
  expenses.forEach(function(r){ totalExp += r.amount; });

  // 自动计入今日采购总额
  var purchaseTotal = getTodayPurchaseTotal();
  var hasPurchase = purchaseTotal > 0;
  totalExp += purchaseTotal;

  document.getElementById('sIncome').textContent = '¥'+totalInc.toLocaleString();
  document.getElementById('sExpense').textContent = '¥'+totalExp.toLocaleString();

  // 合并显示（收款在前，支出在后）
  var merged = incomes.concat(expenses);
  var itemCount = merged.length + (hasPurchase ? 1 : 0);
  var dsTitle = document.querySelector('.ds-title');
  document.getElementById('detailCount').textContent = itemCount+'项';

  var dl = document.getElementById('detailList');
  if(!itemCount){
    dl.innerHTML = '<div class="empty-hint">今天还没有收支记录<br><span style="font-size:var(--fs-15);">上方选择分类，输入金额即可记账</span></div>';
    dsTitle.textContent = '📋 今日收支明细';
    return;
  }
  dsTitle.textContent = '📋 今日收支明细';
  var h='<div class="detail-list">';
  // 采购总额作为第一条（自动计入，不可删除）
  if(hasPurchase){
    h+='<div class="d-item" style="background:var(--brand-light);border-radius:10px;">'+
      '<div class="di-icon" style="background:#e8f5e9;">📦</div>'+
      '<div class="di-info">'+
        '<div class="di-title">食材（采购自动计入）</div>'+
        '<div class="di-meta">今日采购 ×'+merged.filter(function(x){return x.catId==='food';}).length+'笔</div>'+
      '</div>'+
      '<div class="di-amt" style="color:var(--red);">-¥'+purchaseTotal.toLocaleString()+'</div>'+
    '</div>';
  }
  // 手动记账条目
  merged.forEach(function(r){
    var isIncome = r.type==='income';
    var prefix = isIncome ? '+' : '-';
    var amtColor = isIncome ? 'var(--green)' : 'var(--red)';
    var isAuto = r.source==='dish_sales';
    var rc=(r.catColor&&r.catColor!=='undefined')?r.catColor:'#fafafa', ri=(r.catIcon&&r.catIcon!=='undefined')?r.catIcon:'📌', rn=(r.catName&&r.catName!=='undefined')?r.catName:'其他';
    h+='<div class="d-item">'+
      '<div class="di-icon" style="background:'+rc+'">'+ri+'</div>'+
      '<div class="di-info">'+
        '<div class="di-title">'+rn+(isAuto?' <span style="font-size:var(--fs-14);background:#e8f5e9;color:var(--green);padding:1px 5px;border-radius:6px;">自动</span>':'')+'</div>'+
        '<div class="di-meta">'+(r.time&&r.time!=='undefined'?r.time:'—')+'</div>'+
      '</div>'+
      '<div class="di-amt" style="color:'+amtColor+'">'+prefix+'¥'+r.amount.toLocaleString()+'</div>'+
      (isAuto? '' : '<button class="di-del" onclick="delRecord(\''+r.id+'\')">×</button>')+
    '</div>';
  });
  h+='<div class="d-total"><span class="dt-label">支出合计</span> ¥'+totalExp.toLocaleString()+(hasPurchase?'<span style="font-size:var(--fs-14);color:var(--text-m);">（含采购¥'+purchaseTotal.toLocaleString()+'）</span>':'')+' &nbsp; <span class="dt-label">收款合计</span> ¥'+totalInc.toLocaleString()+'</div>';
  h+='</div>';
  dl.innerHTML=h;
}

        h+='<div class="d-item">'+

<script>
/* 自动修复历史脏数据：分类名/图标/颜色为 undefined/空/null 时，按分类id映射回正确名字并写回 */
function repairDirtyRecords(){
  try{
    var recs = getRecords();
    if(!recs || !recs.length) return;
    var map = {};
    function add(a){ if(!a) return; a.forEach(function(c){ if(c && c.id) map[c.id] = c.name || '其他'; }); }
    add(CATS); add(INCOME_CATS); add(customCats); add(customIncomeCats);
    map['other'] = map['other'] || '其他';
    var changed = false;
    var before = recs.length;
    recs = recs.filter(function(r){ return r && r.catId!=='other'; }); // 清理已废弃"其他"分类的孤儿测试账（老板确认删除）
    if(recs.length!==before) changed = true;
    recs.forEach(function(r){
      if(!r) return;
      if(!r.catName || r.catName==='undefined' || r.catName==='[object Object]' || r.catName==='null'){
        r.catName = map[r.catId] || '其他'; changed = true;
      }
      if(!r.catIcon || r.catIcon==='undefined' || r.catIcon==='[object Object]'){ r.catIcon='📌'; changed = true; }
      if(!r.catColor || r.catColor==='undefined'){ r.catColor='#fafafa'; changed = true; }
      if(!r.time || r.time==='undefined' || r.time==='[object Object]'){ r.time='—'; changed = true; }
    });
    if(changed) setRecords(recs);
  }catch(e){ console.warn('repairDirtyRecords failed', e); }
}
repairDirtyRecords();
